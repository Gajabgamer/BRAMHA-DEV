kind = "web"
previewPath = "/"
title = "BugPredictor"
version = "1.0.0"
id = "artifacts/bug-predictor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26041

[services.development]
run = "pnpm --filter @workspace/bug-predictor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bug-predictor", "run", "build" ]
publicDir = "artifacts/bug-predictor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26041"
BASE_PATH = "/"
